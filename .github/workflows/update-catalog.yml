---
name: Update Ether Catalog

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'releases/manifest.json'
      - 'docs/maven-central-status.json'
      - 'docs/descriptions.json'
      - 'scripts/generate-catalog.sh'
  schedule:
    - cron: '30 9 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Make script executable
        run: chmod +x scripts/generate-catalog.sh

      - name: Generate docs/catalog.json
        run: ./scripts/generate-catalog.sh

      - name: Commit and push if changed
        shell: bash
        run: |
          if [ -f docs/catalog.json ] && git diff --quiet docs/catalog.json; then
            echo "No catalog changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/catalog.json
          git commit -m "docs: regenerate catalog.json"
          git push origin main
