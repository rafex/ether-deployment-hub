---
name: Deploy GitHub Packages One Level

on:
  workflow_call:
    inputs:
      modules_json:
        required: true
        type: string
        description: 'JSON array of module names to deploy in this level'
      level_index:
        required: true
        type: number
        description: 'Level index (0-based) for logging'
      maven_central_run_id:
        required: true
        type: string
        description: 'Run ID of the Maven Central workflow whose staged artifacts we use'
    secrets:
      MAVEN_GPG_PASSPHRASE:
        required: true
      GPG_PRIVATE_KEY_B64:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-gh-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Shallow checkout — sources are not needed.
      # We re-use pre-built artifacts staged by the Maven Central workflow
      # instead of recompiling from source.
      # Only the scripts/ and releases/ directories are needed here.
      - name: Checkout repo (shallow, no submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Download release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: release-artifacts

      # Download the JARs/POMs built and staged by deploy-one-level.yml.
      # These come from the Maven Central workflow run, so there is no
      # dependency on Maven Central propagation timing.
      - name: Download level ${{ inputs.level_index }} artifacts from Maven Central run
        uses: actions/download-artifact@v8
        with:
          name: maven-artifacts-level-${{ inputs.level_index }}
          path: ${{ runner.temp }}/maven-artifacts/
          run-id: ${{ inputs.maven_central_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore artifacts to local Maven repository
        shell: bash
        run: |
          set -euo pipefail
          M2_REPO="${HOME}/.m2/repository"
          SRC="${RUNNER_TEMP}/maven-artifacts"
          mkdir -p "$M2_REPO"
          # Merge staged tree into ~/.m2/repository preserving directory structure.
          cp -r "$SRC"/. "$M2_REPO/"
          echo "Restored artifacts:"
          find "$M2_REPO" \( -name "*.pom" -o -name "*.jar" \) | sort

      - name: Set up Java (needed for Maven GPG signing)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          overwrite-settings: false   # deploy-to-github-packages.sh gestiona su propio settings.xml

      - name: Clear stale Maven metadata caches
        shell: bash
        run: |
          # Elimina marcadores .lastUpdated que cachean fallos de descarga previos.
          # setup-java puede restaurar un cache con 403s cacheados de Maven Central
          # que impiden la resolución de descriptores de plugins.
          find "${HOME}/.m2/repository" -name "*.lastUpdated" -delete 2>/dev/null || true
          echo "Stale .lastUpdated markers cleared."

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Deploy level ${{ inputs.level_index }} modules to GitHub Packages
        shell: bash
        env:
          GH_PACKAGES_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR:         ${{ github.actor }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          LEVEL_MODULES_JSON:   ${{ inputs.modules_json }}
        run: |
          set -euo pipefail
          chmod +x ./scripts/deploy-to-github-packages.sh

          # Build a filtered release plan containing only this level's modules.
          LEVEL_PLAN="${RUNNER_TEMP}/release-plan-gh-l${{ inputs.level_index }}.json"
          mapfile -t level_modules < <(echo "$LEVEL_MODULES_JSON" | jq -r '.[]')
          level_names_json=$(printf '%s\n' "${level_modules[@]}" | jq -R . | jq -s .)

          jq --argjson names "$level_names_json" \
            '.modules = [.modules[] | select(.name as $n | $names | index($n) != null)]' \
            ./release-artifacts/release-plan.json > "$LEVEL_PLAN"

          echo "Deploying level ${{ inputs.level_index }} to: https://maven.pkg.github.com/${{ github.repository }}"
          ./scripts/deploy-to-github-packages.sh \
            "$LEVEL_PLAN"                         \
            ./releases/manifest.json              \
            "https://maven.pkg.github.com/${{ github.repository }}"
