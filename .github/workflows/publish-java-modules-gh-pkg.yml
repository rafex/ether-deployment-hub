---
name: Publish Java Modules - GitHub Packages

on:
  workflow_run:
    workflows: ["Publish Java Modules - Maven Central"]
    types: [completed]
  workflow_dispatch:
    inputs:
      maven_central_run_id:
        description: 'Run ID of the Maven Central workflow (for manual re-runs)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  packages: write
  actions: read
  contents: read

jobs:
  # ── Resolve the Maven Central run ID, download the release-plan artifact,
  #    re-upload it so per-level jobs can consume it, and compute level arrays.
  setup:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    outputs:
      maven_central_run_id: ${{ steps.run-id.outputs.run_id }}
      selected_count: ${{ steps.plan.outputs.selected_count }}
      level0: ${{ steps.plan.outputs.level0 }}
      level1: ${{ steps.plan.outputs.level1 }}
      level2: ${{ steps.plan.outputs.level2 }}
      level3: ${{ steps.plan.outputs.level3 }}
      level4: ${{ steps.plan.outputs.level4 }}
      level5: ${{ steps.plan.outputs.level5 }}
      level6: ${{ steps.plan.outputs.level6 }}

    steps:
      - name: Checkout repo (shallow — scripts and releases/ only)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve Maven Central run ID
        id: run-id
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_id=${{ inputs.maven_central_run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release plan from Maven Central run
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: release-artifacts
          run-id: ${{ steps.run-id.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-upload release plan for per-level jobs
        uses: actions/upload-artifact@v7
        with:
          name: release-plan
          path: |
            release-artifacts/release-plan.json
            release-artifacts/release-plan.md
            release-artifacts/version-collision-report.json
            release-artifacts/changelogs/

      - name: Parse release plan and compute deployment levels
        id: plan
        shell: bash
        run: |
          chmod +x ./scripts/release-common.sh ./scripts/compute-deploy-levels.sh
          selected=$(jq -r '.selectedCount' ./release-artifacts/release-plan.json)
          echo "selected_count=$selected" >> "$GITHUB_OUTPUT"

          LEVELS=$(./scripts/compute-deploy-levels.sh ./release-artifacts/release-plan.json)
          echo "Deploy levels:"
          echo "$LEVELS" | jq -r '.levels | to_entries[] | "  L\(.key): \(.value | join(", "))"'
          level_count=$(echo "$LEVELS" | jq '.levels | length')
          for i in 0 1 2 3 4 5 6; do
            if [ "$i" -lt "$level_count" ]; then
              arr=$(echo "$LEVELS" | jq -c ".levels[$i]")
            else
              arr="[]"
            fi
            echo "level${i}=${arr}" >> "$GITHUB_OUTPUT"
          done

  # ── L0 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-0:
    needs: setup
    if: ${{ needs.setup.outputs.selected_count != '0' && needs.setup.outputs.level0 != '[]' }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level0 }}
      level_index: 0
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L1 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-1:
    needs: [setup, deploy-gh-packages-level-0]
    if: ${{ needs.setup.outputs.level1 != '[]' && (needs.deploy-gh-packages-level-0.result == 'success' || needs.deploy-gh-packages-level-0.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level1 }}
      level_index: 1
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L2 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-2:
    needs: [setup, deploy-gh-packages-level-1]
    if: ${{ needs.setup.outputs.level2 != '[]' && (needs.deploy-gh-packages-level-1.result == 'success' || needs.deploy-gh-packages-level-1.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level2 }}
      level_index: 2
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L3 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-3:
    needs: [setup, deploy-gh-packages-level-2]
    if: ${{ needs.setup.outputs.level3 != '[]' && (needs.deploy-gh-packages-level-2.result == 'success' || needs.deploy-gh-packages-level-2.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level3 }}
      level_index: 3
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L4 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-4:
    needs: [setup, deploy-gh-packages-level-3]
    if: ${{ needs.setup.outputs.level4 != '[]' && (needs.deploy-gh-packages-level-3.result == 'success' || needs.deploy-gh-packages-level-3.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level4 }}
      level_index: 4
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L5 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-5:
    needs: [setup, deploy-gh-packages-level-4]
    if: ${{ needs.setup.outputs.level5 != '[]' && (needs.deploy-gh-packages-level-4.result == 'success' || needs.deploy-gh-packages-level-4.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level5 }}
      level_index: 5
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── L6 ────────────────────────────────────────────────────────────────────────
  deploy-gh-packages-level-6:
    needs: [setup, deploy-gh-packages-level-5]
    if: ${{ needs.setup.outputs.level6 != '[]' && (needs.deploy-gh-packages-level-5.result == 'success' || needs.deploy-gh-packages-level-5.result == 'skipped') }}
    uses: ./.github/workflows/deploy-github-packages-one-level.yml
    with:
      modules_json: ${{ needs.setup.outputs.level6 }}
      level_index: 6
      maven_central_run_id: ${{ needs.setup.outputs.maven_central_run_id }}
    secrets:
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
      GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
