---
name: Deploy One Dependency Level

on:
  workflow_call:
    inputs:
      modules_json:
        required: true
        type: string
        description: 'JSON array of module names to deploy in this level'
      level_index:
        required: true
        type: number
        description: 'Level index (0-based) for logging'
    secrets:
      OSSRH_USERNAME:
        required: true
      OSSRH_PASSWORD:
        required: true
      MAVEN_GPG_PASSPHRASE:
        required: true
      GPG_PRIVATE_KEY_B64:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: release-artifacts

      - name: Re-validate collisions before deploy
        shell: bash
        env:
          ALLOW_EXISTING: "true"
        run: |
          chmod +x ./scripts/validate-release-plan-against-central.sh
          ./scripts/validate-release-plan-against-central.sh \
            ./release-artifacts/release-plan.json \
            ./release-artifacts/version-collision-report-l${{ inputs.level_index }}.json

      - name: Apply release plan versions to pom files
        shell: bash
        run: |
          chmod +x ./scripts/apply-release-plan.sh
          ./scripts/apply-release-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Deploy level ${{ inputs.level_index }} modules
        shell: bash
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          LEVEL_MODULES_JSON: ${{ inputs.modules_json }}
          MAVEN_OPTS: "-Xmx768m -XX:+TieredCompilation"
        run: |
          set -euo pipefail
          PLAN="./release-artifacts/release-plan.json"
          ROOT_DIR="$(pwd)"
          LOG_DIR="${RUNNER_TEMP}/deploy-logs"
          mkdir -p "$LOG_DIR"

          mapfile -t level_modules < <(echo "$LEVEL_MODULES_JSON" | jq -r '.[]')

          echo "════════════════════════════════════════════════════════"
          echo " Level ${{ inputs.level_index }} — ${#level_modules[@]} module(s) deploying sequentially"
          echo "════════════════════════════════════════════════════════"

          ok_modules=(); skip_modules=(); fail_modules=()
          level_failed=false

          for module in "${level_modules[@]}"; do
            release_level=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .releaseLevel' "$PLAN")
            if [ "$release_level" = "none" ]; then
              echo "  [SKIP] $module (releaseLevel=none)"
              continue
            fi

            module_path=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .path' "$PLAN")
            next_version=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .nextVersion' "$PLAN")
            log_file="$LOG_DIR/deploy-${module}.log"

            echo "  [START] $module ($next_version)"
            if (
              cd "$ROOT_DIR/$module_path"
              make deploy \
                VERSION="$next_version" \
                FORCE_EXACT_VERSION=true \
                SYNC_FROM_REPO=false \
                SKIP_TESTS=false \
                AUTO_UPDATE_LICENSE_HEADERS=true
            ) >"$log_file" 2>&1; then
              echo "  [OK]   $module ($next_version)"
              ok_modules+=("$module ($next_version)")
            else
              if grep -Eq \
                "already exists|Component with package url:.*already exists" \
                "$log_file" 2>/dev/null; then
                echo "  [SKIP] $module ($next_version) — already published in Sonatype Central"
                skip_modules+=("$module ($next_version)")
              else
                echo "  [FAIL] $module ($next_version)"
                echo "──── $log_file ────"
                cat "$log_file"
                echo "────────────────────"
                fail_modules+=("$module ($next_version)")
                level_failed=true
              fi
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo " Level ${{ inputs.level_index }} — Summary"
          echo "════════════════════════════════════════════════════════"
          echo " ✅ published : ${#ok_modules[@]}"
          for m in "${ok_modules[@]}"; do echo "      • $m"; done
          echo " ⏭  skipped   : ${#skip_modules[@]}"
          for m in "${skip_modules[@]}"; do echo "      • $m"; done
          echo " ❌ failed    : ${#fail_modules[@]}"
          for m in "${fail_modules[@]}"; do echo "      • $m"; done
          echo "════════════════════════════════════════════════════════"

          if $level_failed; then
            echo "ERROR: One or more modules failed in level ${{ inputs.level_index }}."
            exit 1
          fi

      - name: Collect built artifacts for GitHub Packages
        # Stage the JARs/POMs built (and installed to ~/.m2) by the deploy step
        # so the independent GitHub Packages workflow can download them directly
        # from GitHub Actions artifact storage instead of polling Maven Central.
        shell: bash
        env:
          LEVEL_MODULES_JSON: ${{ inputs.modules_json }}
        run: |
          set -euo pipefail
          PLAN="./release-artifacts/release-plan.json"
          M2_REPO="${HOME}/.m2/repository"
          STAGING="${RUNNER_TEMP}/maven-artifacts-level-${{ inputs.level_index }}"
          mkdir -p "$STAGING"

          mapfile -t level_modules < <(echo "$LEVEL_MODULES_JSON" | jq -r '.[]')

          for module in "${level_modules[@]}"; do
            release_level=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .releaseLevel' "$PLAN")
            [ "$release_level" = "none" ] && continue

            version=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .nextVersion' "$PLAN")
            group_id=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .groupId' "./releases/manifest.json")
            artifact_id=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .artifactId' "./releases/manifest.json")

            group_path="${group_id//./\/}"
            src="${M2_REPO}/${group_path}/${artifact_id}/${version}"
            dst="${STAGING}/${group_path}/${artifact_id}/${version}"
            mkdir -p "$dst"

            # Copy POM + JARs (skip GPG signatures and checksums — GH Packages
            # will re-sign with its own key via deploy-to-github-packages.sh).
            for f in \
              "${artifact_id}-${version}.pom" \
              "${artifact_id}-${version}.jar" \
              "${artifact_id}-${version}-sources.jar" \
              "${artifact_id}-${version}-javadoc.jar"; do
              [ -f "${src}/${f}" ] && cp "${src}/${f}" "${dst}/${f}" && \
                echo "  [STAGED] ${f}" || true
            done
          done

      - name: Upload level ${{ inputs.level_index }} artifacts
        uses: actions/upload-artifact@v7
        with:
          name: maven-artifacts-level-${{ inputs.level_index }}
          path: ${{ runner.temp }}/maven-artifacts-level-${{ inputs.level_index }}/
          if-no-files-found: warn
