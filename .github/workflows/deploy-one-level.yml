---
name: Deploy One Dependency Level

on:
  workflow_call:
    inputs:
      modules_json:
        required: true
        type: string
        description: 'JSON array of module names to deploy in this level'
      level_index:
        required: true
        type: number
        description: 'Level index (0-based) for logging'
    secrets:
      OSSRH_USERNAME:
        required: true
      OSSRH_PASSWORD:
        required: true
      MAVEN_GPG_PASSPHRASE:
        required: true
      GPG_PRIVATE_KEY_B64:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: release-artifacts

      - name: Re-validate collisions before deploy
        shell: bash
        env:
          ALLOW_EXISTING: "true"
        run: |
          chmod +x ./scripts/validate-release-plan-against-central.sh
          ./scripts/validate-release-plan-against-central.sh \
            ./release-artifacts/release-plan.json \
            ./release-artifacts/version-collision-report-l${{ inputs.level_index }}.json

      - name: Apply release plan versions to pom files
        shell: bash
        run: |
          chmod +x ./scripts/apply-release-plan.sh
          ./scripts/apply-release-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Deploy level ${{ inputs.level_index }} modules in parallel
        shell: bash
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          LEVEL_MODULES_JSON: ${{ inputs.modules_json }}
          MAVEN_OPTS: "-Xmx768m -XX:+TieredCompilation"
        run: |
          set -euo pipefail
          PLAN="./release-artifacts/release-plan.json"
          ROOT_DIR="$(pwd)"
          LOG_DIR="${RUNNER_TEMP}/deploy-logs"
          mkdir -p "$LOG_DIR"

          mapfile -t level_modules < <(echo "$LEVEL_MODULES_JSON" | jq -r '.[]')

          echo "════════════════════════════════════════════════════════"
          echo " Level ${{ inputs.level_index }} — ${#level_modules[@]} module(s) deploying in parallel"
          echo "════════════════════════════════════════════════════════"

          pids=()
          log_files=()
          deployed_modules=()
          deployed_versions=()

          for module in "${level_modules[@]}"; do
            release_level=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .releaseLevel' "$PLAN")
            if [ "$release_level" = "none" ]; then
              echo "  [SKIP] $module (releaseLevel=none)"
              continue
            fi

            module_path=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .path' "$PLAN")
            next_version=$(jq -r --arg m "$module" \
              '.modules[] | select(.name == $m) | .nextVersion' "$PLAN")
            log_file="$LOG_DIR/deploy-${module}.log"

            echo "  [START] $module ($next_version)"
            (
              cd "$ROOT_DIR/$module_path"
              make deploy \
                VERSION="$next_version" \
                FORCE_EXACT_VERSION=true \
                SYNC_FROM_REPO=false \
                SKIP_TESTS=false \
                AUTO_UPDATE_LICENSE_HEADERS=true
            ) >"$log_file" 2>&1 &

            pids+=($!)
            log_files+=("$log_file")
            deployed_modules+=("$module")
            deployed_versions+=("$next_version")
          done

          ok_modules=(); skip_modules=(); fail_modules=()
          level_failed=false

          for i in "${!pids[@]}"; do
            module="${deployed_modules[$i]}"
            version="${deployed_versions[$i]}"
            log_file="${log_files[$i]}"

            if wait "${pids[$i]}"; then
              echo "  [OK]   $module ($version)"
              ok_modules+=("$module ($version)")
            else
              if grep -Eq \
                "already exists|Component with package url:.*already exists" \
                "$log_file" 2>/dev/null; then
                echo "  [SKIP] $module ($version) — already published in Sonatype Central"
                skip_modules+=("$module ($version)")
              else
                echo "  [FAIL] $module ($version)"
                echo "──── $log_file ────"
                cat "$log_file"
                echo "────────────────────"
                fail_modules+=("$module ($version)")
                level_failed=true
              fi
            fi
          done

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo " Level ${{ inputs.level_index }} — Summary"
          echo "════════════════════════════════════════════════════════"
          echo " ✅ published : ${#ok_modules[@]}"
          for m in "${ok_modules[@]}"; do echo "      • $m"; done
          echo " ⏭  skipped   : ${#skip_modules[@]}"
          for m in "${skip_modules[@]}"; do echo "      • $m"; done
          echo " ❌ failed    : ${#fail_modules[@]}"
          for m in "${fail_modules[@]}"; do echo "      • $m"; done
          echo "════════════════════════════════════════════════════════"

          if $level_failed; then
            echo "ERROR: One or more modules failed in level ${{ inputs.level_index }}."
            exit 1
          fi
