---
name: Publish Java Modules - Maven Central

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Git ref to compare from'
        required: false
        type: string
      head_ref:
        description: 'Git ref to compare to'
        required: false
        type: string
      run_deploy:
        description: 'Execute deploy to Maven Central'
        required: false
        type: boolean
        default: true
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      selected_count: ${{ steps.plan.outputs.selected_count }}
      base_ref: ${{ steps.refs.outputs.base_ref }}
      head_ref: ${{ steps.refs.outputs.head_ref }}
      level0: ${{ steps.plan.outputs.level0 }}
      level1: ${{ steps.plan.outputs.level1 }}
      level2: ${{ steps.plan.outputs.level2 }}
      level3: ${{ steps.plan.outputs.level3 }}
      level4: ${{ steps.plan.outputs.level4 }}
      level5: ${{ steps.plan.outputs.level5 }}
      level6: ${{ steps.plan.outputs.level6 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve comparison refs
        id: refs
        shell: bash
        run: |
          BASE_INPUT="${{ inputs.base_ref }}"
          HEAD_INPUT="${{ inputs.head_ref }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$BASE_INPUT" ]; then
              BASE_REF="$BASE_INPUT"
            else
              BASE_REF="$(git rev-parse "${CURRENT_SHA}^" 2>/dev/null || true)"
            fi
            if [ -n "$HEAD_INPUT" ]; then
              HEAD_REF="$HEAD_INPUT"
            else
              HEAD_REF="$CURRENT_SHA"
            fi
          else
            PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_SHA}^" 2>/dev/null || true)"
            if [ -n "$PREV_TAG" ]; then
              BASE_REF="$PREV_TAG"
            else
              BASE_REF="$(git rev-parse "${CURRENT_SHA}^" 2>/dev/null || true)"
            fi
            HEAD_REF="$CURRENT_SHA"
          fi

          if [ -z "$BASE_REF" ]; then
            BASE_REF="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Generate release plan
        id: plan
        shell: bash
        run: |
          chmod +x ./scripts/release-common.sh ./scripts/detect-changed-modules.sh ./scripts/generate-release-plan.sh ./scripts/validate-release-plan-against-central.sh ./scripts/sync-manifest-from-central.sh ./scripts/compute-deploy-levels.sh
          ./scripts/sync-manifest-from-central.sh ./releases/manifest.json
          ./scripts/generate-release-plan.sh "${{ steps.refs.outputs.base_ref }}" "${{ steps.refs.outputs.head_ref }}"
          ./scripts/validate-release-plan-against-central.sh ./release-artifacts/release-plan.json ./release-artifacts/version-collision-report.json
          selected="$(jq -r '.selectedCount' ./release-artifacts/release-plan.json)"
          echo "selected_count=$selected" >> "$GITHUB_OUTPUT"
          # Compute dependency levels and output as JSON arrays for per-level jobs
          LEVELS=$(./scripts/compute-deploy-levels.sh ./release-artifacts/release-plan.json)
          echo "Deploy levels:"
          echo "$LEVELS" | jq -r '.levels | to_entries[] | "  L\(.key): \(.value | join(", "))"'
          level_count=$(echo "$LEVELS" | jq '.levels | length')
          for i in 0 1 2 3 4 5 6; do
            if [ "$i" -lt "$level_count" ]; then
              arr=$(echo "$LEVELS" | jq -c ".levels[$i]")
            else
              arr="[]"
            fi
            echo "level${i}=${arr}" >> "$GITHUB_OUTPUT"
          done

      - name: Upload release plan artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-plan
          path: |
            release-artifacts/release-plan.json
            release-artifacts/release-plan.md
            release-artifacts/version-collision-report.json
            release-artifacts/changelogs/

  # ── L0: ether-parent (BOM — no ether deps) ───────────────────────────────
  deploy-level-0:
    needs: release-plan
    if: ${{ needs.release-plan.outputs.selected_count != '0' && needs.release-plan.outputs.level0 != '[]' && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level0 }}
      level_index: 0
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L1: modules that only depend on ether-parent ─────────────────────────
  deploy-level-1:
    needs: [release-plan, deploy-level-0]
    if: ${{ needs.release-plan.outputs.level1 != '[]' && (needs.deploy-level-0.result == 'success' || needs.deploy-level-0.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level1 }}
      level_index: 1
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L2: modules that depend on L1 ────────────────────────────────────────
  deploy-level-2:
    needs: [release-plan, deploy-level-1]
    if: ${{ needs.release-plan.outputs.level2 != '[]' && (needs.deploy-level-1.result == 'success' || needs.deploy-level-1.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level2 }}
      level_index: 2
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L3: modules that depend on L2 ────────────────────────────────────────
  deploy-level-3:
    needs: [release-plan, deploy-level-2]
    if: ${{ needs.release-plan.outputs.level3 != '[]' && (needs.deploy-level-2.result == 'success' || needs.deploy-level-2.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level3 }}
      level_index: 3
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L4: modules that depend on L3 ────────────────────────────────────────
  deploy-level-4:
    needs: [release-plan, deploy-level-3]
    if: ${{ needs.release-plan.outputs.level4 != '[]' && (needs.deploy-level-3.result == 'success' || needs.deploy-level-3.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level4 }}
      level_index: 4
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L5: overflow from L3/L4 split or deeper deps ─────────────────────────
  deploy-level-5:
    needs: [release-plan, deploy-level-4]
    if: ${{ needs.release-plan.outputs.level5 != '[]' && (needs.deploy-level-4.result == 'success' || needs.deploy-level-4.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level5 }}
      level_index: 5
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ── L6: overflow from L4/L5 split or deepest deps ────────────────────────
  deploy-level-6:
    needs: [release-plan, deploy-level-5]
    if: ${{ needs.release-plan.outputs.level6 != '[]' && (needs.deploy-level-5.result == 'success' || needs.deploy-level-5.result == 'skipped') && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    uses: ./.github/workflows/deploy-one-level.yml
    with:
      modules_json: ${{ needs.release-plan.outputs.level6 }}
      level_index: 6
    secrets:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}

  # ────────────────────────────────────────────────────────────────────────────
  # Update manifest — runs after all Maven Central levels complete.
  # GitHub Packages deploy is handled by a separate workflow
  # (publish-java-modules-gh-pkg.yml) triggered via workflow_run.
  # ────────────────────────────────────────────────────────────────────────────
  update-manifest:
    needs:
      - release-plan
      - deploy-level-6
    if: ${{ needs.release-plan.outputs.selected_count != '0' && (needs.deploy-level-6.result == 'success' || needs.deploy-level-6.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: release-artifacts

      - name: Update release manifest from successful plan
        shell: bash
        run: |
          chmod +x ./scripts/update-manifest-from-plan.sh
          ./scripts/update-manifest-from-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Commit and push manifest updates if changed
        shell: bash
        run: |
          if git diff --quiet releases/manifest.json; then
            echo "No manifest changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/manifest.json
          git commit -m "release: update manifest after publish"
          git push origin main
