---
name: Publish Java Modules

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Git ref to compare from'
        required: false
        type: string
      head_ref:
        description: 'Git ref to compare to'
        required: false
        type: string
      run_deploy:
        description: 'Execute deploy to Maven Central'
        required: false
        type: boolean
        default: true
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write

jobs:
  release-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      selected_count: ${{ steps.plan.outputs.selected_count }}
      base_ref: ${{ steps.refs.outputs.base_ref }}
      head_ref: ${{ steps.refs.outputs.head_ref }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve comparison refs
        id: refs
        shell: bash
        run: |
          BASE_INPUT="${{ inputs.base_ref }}"
          HEAD_INPUT="${{ inputs.head_ref }}"
          CURRENT_SHA="${{ github.sha }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$BASE_INPUT" ]; then
              BASE_REF="$BASE_INPUT"
            else
              BASE_REF="$(git rev-parse "${CURRENT_SHA}^" 2>/dev/null || true)"
            fi
            if [ -n "$HEAD_INPUT" ]; then
              HEAD_REF="$HEAD_INPUT"
            else
              HEAD_REF="$CURRENT_SHA"
            fi
          else
            PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_SHA}^" 2>/dev/null || true)"
            if [ -n "$PREV_TAG" ]; then
              BASE_REF="$PREV_TAG"
            else
              BASE_REF="$(git rev-parse "${CURRENT_SHA}^" 2>/dev/null || true)"
            fi
            HEAD_REF="$CURRENT_SHA"
          fi

          if [ -z "$BASE_REF" ]; then
            BASE_REF="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Generate release plan
        id: plan
        shell: bash
        run: |
          chmod +x ./scripts/release-common.sh ./scripts/detect-changed-modules.sh ./scripts/generate-release-plan.sh ./scripts/validate-release-plan-against-central.sh ./scripts/sync-manifest-from-central.sh ./scripts/compute-deploy-levels.sh
          ./scripts/sync-manifest-from-central.sh ./releases/manifest.json
          ./scripts/generate-release-plan.sh "${{ steps.refs.outputs.base_ref }}" "${{ steps.refs.outputs.head_ref }}"
          ./scripts/validate-release-plan-against-central.sh ./release-artifacts/release-plan.json ./release-artifacts/version-collision-report.json
          selected="$(jq -r '.selectedCount' ./release-artifacts/release-plan.json)"
          echo "selected_count=$selected" >> "$GITHUB_OUTPUT"

      - name: Upload release plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-plan
          path: |
            release-artifacts/release-plan.json
            release-artifacts/release-plan.md
            release-artifacts/version-collision-report.json
            release-artifacts/changelogs/

  deploy:
    needs: release-plan
    if: ${{ needs.release-plan.outputs.selected_count != '0' && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    runs-on: ubuntu-latest
    # 5 dependency levels × ~20 min/level (parallel) + buffer = 120 min max
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: release-artifacts

      - name: Re-validate collisions before deploy
        shell: bash
        env:
          # Allow already-published versions so re-runs skip them gracefully.
          # The deploy step handles "already exists" responses from Sonatype.
          ALLOW_EXISTING: "true"
        run: |
          chmod +x ./scripts/validate-release-plan-against-central.sh
          ./scripts/validate-release-plan-against-central.sh \
            ./release-artifacts/release-plan.json \
            ./release-artifacts/version-collision-report-deploy.json

      - name: Apply release plan versions to pom files
        shell: bash
        run: |
          chmod +x ./scripts/apply-release-plan.sh
          ./scripts/apply-release-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys

      - name: Compute parallel deploy levels
        id: levels
        shell: bash
        run: |
          chmod +x ./scripts/compute-deploy-levels.sh
          LEVELS_FILE="${RUNNER_TEMP}/deploy-levels.json"
          ./scripts/compute-deploy-levels.sh ./release-artifacts/release-plan.json \
            > "$LEVELS_FILE"
          echo "Deploy levels:"
          jq -r '.levels | to_entries[] | "  L\(.key): \(.value | join(", "))"' "$LEVELS_FILE"
          echo "levels_file=$LEVELS_FILE" >> "$GITHUB_OUTPUT"

      - name: Deploy modules in parallel dependency levels
        shell: bash
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          # Limit heap per Maven process to avoid OOM when many run in parallel
          MAVEN_OPTS: "-Xmx768m -XX:+TieredCompilation"
        run: |
          set -euo pipefail
          PLAN="./release-artifacts/release-plan.json"
          LEVELS_FILE="${{ steps.levels.outputs.levels_file }}"
          ROOT_DIR="$(pwd)"
          LOG_DIR="${RUNNER_TEMP}/deploy-logs"
          mkdir -p "$LOG_DIR"

          level_count=$(jq '.levels | length' "$LEVELS_FILE")
          total_ok=0
          total_skip=0
          total_fail=0

          for level_idx in $(seq 0 $((level_count - 1))); do
            # ── collect modules for this level ─────────────────────────────
            mapfile -t level_modules < <(jq -r ".levels[$level_idx][]" "$LEVELS_FILE")
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo " Level $level_idx — ${#level_modules[@]} module(s) in parallel"
            echo "════════════════════════════════════════════════════════"

            pids=()
            log_files=()
            deployed_modules=()

            for module in "${level_modules[@]}"; do
              release_level=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .releaseLevel' "$PLAN")
              if [ "$release_level" = "none" ]; then
                echo "  [SKIP] $module (releaseLevel=none)"
                continue
              fi

              module_path=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .path' "$PLAN")
              next_version=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .nextVersion' "$PLAN")
              log_file="$LOG_DIR/deploy-${module}.log"

              echo "  [START] $module ($next_version)"
              (
                cd "$ROOT_DIR/$module_path"
                make deploy \
                  VERSION="$next_version" \
                  FORCE_EXACT_VERSION=true \
                  SYNC_FROM_REPO=false \
                  SKIP_TESTS=false \
                  AUTO_UPDATE_LICENSE_HEADERS=true
              ) >"$log_file" 2>&1 &

              pids+=($!)
              log_files+=("$log_file")
              deployed_modules+=("$module")
            done

            # ── wait for every background process in this level ───────────
            level_failed=false
            for i in "${!pids[@]}"; do
              module="${deployed_modules[$i]}"
              log_file="${log_files[$i]}"

              if wait "${pids[$i]}"; then
                echo "  [OK]   $module"
                (( total_ok++ )) || true
              else
                if grep -Eq \
                  "already exists|Component with package url:.*already exists" \
                  "$log_file" 2>/dev/null; then
                  echo "  [SKIP] $module — already published in Sonatype Central"
                  (( total_skip++ )) || true
                else
                  echo "  [FAIL] $module — see log below"
                  echo "──── $log_file ────"
                  cat "$log_file"
                  echo "────────────────────"
                  level_failed=true
                  (( total_fail++ )) || true
                fi
              fi
            done

            if $level_failed; then
              echo ""
              echo "ERROR: One or more modules failed in level $level_idx. Aborting."
              exit 1
            fi

            echo " Level $level_idx complete ✓"
          done

          echo ""
          echo "══════════════════════════════════"
          echo " Deploy summary"
          echo "  published : $total_ok"
          echo "  skipped   : $total_skip"
          echo "  failed    : $total_fail"
          echo "══════════════════════════════════"

  # ────────────────────────────────────────────────────────────────────────────
  # GitHub Packages deploy — runs in parallel with nothing (starts after deploy)
  # Re-uses pre-built artifacts from ~/.m2 that were installed during the Maven
  # Central deploy step.  No recompilation; no GPG signing required.
  # Packages land at: https://maven.pkg.github.com/rafex/ether-deployment-hub
  # ────────────────────────────────────────────────────────────────────────────
  deploy-github-packages:
    needs:
      - release-plan
      - deploy
    if: ${{ needs.release-plan.outputs.selected_count != '0' && needs.deploy.result == 'success' && (github.event_name != 'workflow_dispatch' || inputs.run_deploy == true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: release-artifacts

      - name: Apply release plan versions to pom files
        shell: bash
        run: |
          chmod +x ./scripts/apply-release-plan.sh
          ./scripts/apply-release-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build all modules (install to local Maven cache)
        # DEPLOY_PROFILE="" disables the Sonatype Central profile and GPG plugin.
        # maven.deploy.skip=true (derived automatically when DEPLOY_PROFILE is empty)
        # means mvn runs through the install lifecycle but does NOT deploy remotely.
        # Artifacts land in ~/.m2/repository for the deploy:deploy-file step below.
        shell: bash
        env:
          MAVEN_OPTS: "-Xmx768m"
        run: |
          chmod +x ./scripts/compute-deploy-levels.sh
          LEVELS_FILE="${RUNNER_TEMP}/deploy-levels.json"
          ./scripts/compute-deploy-levels.sh ./release-artifacts/release-plan.json \
            > "$LEVELS_FILE"

          PLAN="./release-artifacts/release-plan.json"
          ROOT_DIR="$(pwd)"
          level_count=$(jq '.levels | length' "$LEVELS_FILE")

          for level_idx in $(seq 0 $((level_count - 1))); do
            mapfile -t level_modules < <(jq -r ".levels[$level_idx][]" "$LEVELS_FILE")
            echo "=== Build Level $level_idx: ${level_modules[*]} ==="
            pids=()

            for module in "${level_modules[@]}"; do
              release_level=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .releaseLevel' "$PLAN")
              [ "$release_level" = "none" ] && continue

              module_path=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .path' "$PLAN")
              next_version=$(jq -r --arg m "$module" \
                '.modules[] | select(.name == $m) | .nextVersion' "$PLAN")

              (
                cd "$ROOT_DIR/$module_path"
                # DEPLOY_PROFILE="" → no Sonatype/GPG profile activated
                # MAVEN_DEPLOY_SKIP is set to true automatically (see common.mk)
                make deploy                          \
                  VERSION="$next_version"            \
                  FORCE_EXACT_VERSION=true           \
                  SYNC_FROM_REPO=false               \
                  SKIP_TESTS=true                    \
                  AUTO_UPDATE_LICENSE_HEADERS=false  \
                  DEPLOY_PROFILE=""
              ) >"${RUNNER_TEMP}/build-${module}.log" 2>&1 &
              pids+=($!)
            done

            # Wait for all parallel builds in this level before moving to next
            for pid in "${pids[@]}"; do wait "$pid" || true; done
            echo "  Level $level_idx built ✓"
          done

      - name: Deploy all modules to GitHub Packages
        shell: bash
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          chmod +x ./scripts/deploy-to-github-packages.sh
          echo "Deploying to: https://maven.pkg.github.com/${{ github.repository }}"
          ./scripts/deploy-to-github-packages.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json              \
            "https://maven.pkg.github.com/${{ github.repository }}"

  # ────────────────────────────────────────────────────────────────────────────
  # Update manifest — waits for both Maven Central and GitHub Packages deploys
  # ────────────────────────────────────────────────────────────────────────────
  update-manifest:
    needs:
      - release-plan
      - deploy
      - deploy-github-packages
    if: ${{ needs.release-plan.outputs.selected_count != '0' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Download release plan artifact
        uses: actions/download-artifact@v4
        with:
          name: release-plan
          path: release-artifacts

      - name: Update release manifest from successful plan
        shell: bash
        run: |
          chmod +x ./scripts/update-manifest-from-plan.sh
          ./scripts/update-manifest-from-plan.sh \
            ./release-artifacts/release-plan.json \
            ./releases/manifest.json

      - name: Commit and push manifest updates if changed
        shell: bash
        run: |
          if git diff --quiet releases/manifest.json; then
            echo "No manifest changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/manifest.json
          git commit -m "release: update manifest after publish"
          git push origin main
