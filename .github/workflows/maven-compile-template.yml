---
name: "Java Compile Template"

on:
  workflow_call:
    inputs:
      module-path:
        description: "Ruta del módulo Java a compilar"
        required: true
        type: string
      dependency-module-paths:
        description: "Optional comma-separated local module paths to build/install before target compile"
        required: false
        type: string
        default: ''
      java-distribution:
        description: "Java distribution to use (default: temurin)"
        required: false
        type: string
        default: 'temurin'
      java-version:
        description: "Java version to use (default: 21)"
        required: false
        type: string
        default: '21'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  compile:
    name: Compile ${{ inputs.module-path }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: 'maven'

      - name: Compile module with local dependencies
        shell: bash
        run: |
          set -euo pipefail

          resolve_module_build_dir() {
            local module_path="$1"
            if [ -x "$module_path/mvnw" ] && [ -f "$module_path/pom.xml" ]; then
              echo "$module_path"
              return 0
            fi
            if [ -x "$module_path/$module_path/mvnw" ] && [ -f "$module_path/$module_path/pom.xml" ]; then
              echo "$module_path/$module_path"
              return 0
            fi

            local candidate
            candidate="$(find "$module_path" -mindepth 1 -maxdepth 2 -type f -name pom.xml | head -n1 | xargs dirname || true)"
            if [ -n "$candidate" ] && [ -x "$candidate/mvnw" ]; then
              echo "$candidate"
              return 0
            fi

            echo "Could not resolve Maven build directory for module: $module_path"
            exit 1
          }

          DEPS="${{ inputs.dependency-module-paths }}"
          if [ -n "$DEPS" ]; then
            IFS=',' read -ra MODULES <<< "$DEPS"
            for module in "${MODULES[@]}"; do
              module="$(echo "$module" | xargs)"
              if [ -z "$module" ]; then
                continue
              fi
              build_dir="$(resolve_module_build_dir "$module")"
              echo "Installing local dependency module: $module (dir: $build_dir)"
              cd "$build_dir"
              ./mvnw -B -ntp -DskipTests=true -Dgpg.skip=true clean install
              cd - >/dev/null
            done
          fi

          target_build_dir="$(resolve_module_build_dir "${{ inputs.module-path }}")"
          echo "Compiling target module: ${{ inputs.module-path }} (dir: $target_build_dir)"
          cd "$target_build_dir"
          ./mvnw -B -ntp -DskipTests=true clean compile
