---
name: Update README From Release Tag

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to write in README (example: 3.0.7)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi
          echo "value=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render README from template
        run: |
          ./scripts/render-readme.sh "${{ steps.tag.outputs.value }}"

      - name: Commit and push if changed
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "No README changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update release badge for ${{ steps.tag.outputs.value }}"
          git push origin main
