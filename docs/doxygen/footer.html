<script type="module">
  /**
   * Mermaid integration for Doxygen HTML output.
   *
   * Doxygen renders ```mermaid fenced blocks as plain <div class="fragment"><pre class="fragment">
   * without a language class. This script detects those blocks by matching the first keyword of
   * known Mermaid diagram types, replaces them with <div class="mermaid">, and lets Mermaid render.
   *
   * Keeping ```mermaid in the source .md files means GitHub also renders the diagrams natively.
   */
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
  });

  const MERMAID_FIRST_TOKEN = /^\s*(sequenceDiagram|graph[\s\t\n]|flowchart[\s\t\n]|classDiagram|stateDiagram(-v2)?|erDiagram|gantt|pie[\s\t\n]|gitGraph|mindmap|quadrantChart|block-beta|architecture-beta|xychart-beta|timeline|sankey-beta)/;

  // Doxygen wraps code blocks in: <div class="fragment"><pre class="fragment">...</pre></div>
  // For ```mermaid blocks the pre gets no language class, so we match by content.
  document.querySelectorAll('div.fragment > pre.fragment').forEach(pre => {
    const text = (pre.innerText ?? pre.textContent ?? '').trim();
    if (!MERMAID_FIRST_TOKEN.test(text)) return;

    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = text;
    // Replace the outer div.fragment wrapper
    pre.closest('div.fragment').replaceWith(div);
  });

  // Also handle explicit <div class="mermaid"> blocks already in the HTML
  // (e.g. from raw HTML written directly in Markdown)
  await mermaid.run();
</script>
