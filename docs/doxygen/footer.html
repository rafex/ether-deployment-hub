<script type="module">
  /**
   * Mermaid integration for Doxygen HTML output.
   *
   * Doxygen renders ```mermaid fenced blocks as plain <div class="fragment"><pre class="fragment">
   * without a language class. This script detects those blocks by matching the first keyword of
   * known Mermaid diagram types, replaces them with <div class="mermaid">, and lets Mermaid render.
   *
   * Keeping ```mermaid in the source .md files means GitHub also renders the diagrams natively.
   */
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  mermaid.initialize({
    startOnLoad: false,
    theme: 'default',
    securityLevel: 'loose',
  });

  const MERMAID_FIRST_TOKEN = /^\s*(sequenceDiagram|graph[\s\t\n]|flowchart[\s\t\n]|classDiagram|stateDiagram(-v2)?|erDiagram|gantt|pie[\s\t\n]|gitGraph|mindmap|quadrantChart|block-beta|architecture-beta|xychart-beta|timeline|sankey-beta)/;

  // Doxygen 1.x renders ```mermaid fenced blocks as:
  //   <div class="fragment"><div class="line">graph TD</div><div class="line">...</div></div>
  // (no <pre>, each source line becomes a <div class="line">)
  document.querySelectorAll('div.fragment').forEach(block => {
    const lines = block.querySelectorAll('div.line');
    if (!lines.length) return;

    const firstLine = (lines[0].textContent ?? '').trim();
    if (!MERMAID_FIRST_TOKEN.test(firstLine)) return;

    // Reconstruct diagram source from all lines
    const source = Array.from(lines).map(l => l.textContent).join('\n');

    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = source;
    block.replaceWith(div);
  });

  // Also handle explicit <div class="mermaid"> blocks already in the HTML
  await mermaid.run();
</script>

</body>
