# ─────────────────────────────────────────────────────────────────────────────
# EtherBrain — logging.properties
#
# Cargado desde el classpath al arrancar (antes de que LoggingConfigurator
# configure el ConsoleHandler y aplique LOG_LEVEL).
#
# PROPÓSITO: definir niveles por paquete para silenciar loggers verbosos de
# librerías de terceros. El nivel global del runtime se controla con la
# variable de entorno LOG_LEVEL (no con este archivo).
#
# PRIORIDAD de configuración:
#   1. LOG_LEVEL   → nivel del root logger (controla todo)
#   2. Este archivo → niveles por paquete (más restrictivos que el root)
#   3. LOG_FILE    → añade FileHandler con rotación al root logger
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Librerías de terceros — silenciar mensajes de infraestructura ─────────────

# Jetty 12 — suprime mensajes de arranque, TLS handshakes y connection pools
org.eclipse.jetty.level=WARNING

# Eclipse Paho MQTT — suprime reconexiones automáticas y heartbeats
org.eclipse.paho.level=WARNING

# Jackson — suprime warnings de deserialización y reflexión
com.fasterxml.jackson.level=WARNING

# AWS SDK v2 (Bedrock) — suprime retries, endpoint discovery y auth refresh
software.amazon.awssdk.level=WARNING

# ── Paquetes propios — descomenta para activar trazas detalladas ──────────────
#
# dev.rafex.etherbrain.level=INFO
#
# Traza el loop del agente paso a paso (tool calls, respuestas del modelo):
# dev.rafex.etherbrain.core.runtime.level=FINE
#
# Traza las peticiones y respuestas HTTP al proveedor LLM:
# dev.rafex.etherbrain.infra.http.level=FINE
#
# Traza los mensajes MQTT entrantes y salientes:
# dev.rafex.etherbrain.mqtt.level=FINE
#
# Traza las lecturas/escrituras de sesión en disco:
# dev.rafex.etherbrain.infra.file.level=FINE
